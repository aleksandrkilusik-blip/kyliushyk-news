              en: `Greetings from Ukraine! My name is Kostya, and my wife Lana and I are missionaries with the student ministry "Ukraine for Christ" (Campus Crusade for Christ International). We both came to the Lord during our studies through student ministry. We volunteered for a long time, building spiritual movements in our universities, and eventually made a firm decision to dedicate our lives to full-time ministry. Today we are also incredibly blessed with our young son Nazarik.

With the start of the full-scale war against Russia, I was mobilized into the Armed Forces of Ukraine. I spent the first six months on the front lines, facing the harsh realities of combat. By God's grace and through the prayers of many, I was later transferred to a non-combat position at the military headquarters in my hometown of Odesa. This period became a time of deep spiritual growth. Recently, I completed active military service, which allowed me to return to my missionary calling. Lana is currently working with another mission that supports war victims and military personnel.

God is expanding my influence in amazing ways. While I continue to serve students, my experience as a veteran has placed a heavy burden on my heart to minister to military personnel and veterans. They have faced the darkness and trauma of war in a unique way and now, more than ever, need the hope of the Gospel. To faithfully follow this calling, I am in a strategic transition: until the end of 2026, I am partially serving as the Campus Odesa team leader and partially launching a new veterans ministry. From January 2027, I will transition fully to veterans ministry.`

                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">

                    onClick={navigateToHome}
                    class="flex items-center text-[#5C6E62] hover:text-[#2B3830] transition-colors mb-8 font-bold uppercase tracking-widest military-font text-xs"
                  >
                    <ArrowLeftIcon className="mr-2" />
                    {translations[lang].detailBack}
                  </button>
                  
                  <div class="bg-white border border-[#DCE3DB] rounded-sm shadow-sm overflow-hidden relative">
                    {/* Тактична плашка профілю */}
                    <div class="bg-[#E9EBE4] border-b border-[#DCE3DB] px-8 py-3.5 flex justify-between items-center">
                        <span class="military-font text-[10px] font-bold uppercase tracking-[0.25em] text-[#2B3830]">{translations[lang].detailRecord}</span>
                        <span class="w-2.5 h-2.5 rounded-full bg-[#768E80]"></span>

                    <div class="h-[28rem] sm:h-[38rem] w-full relative border-b border-[#DCE3DB] bg-[#EBF0EC]">
                      <img 
                        src={selectedMember.image} 
                        alt={selectedMember.name[lang]} 
                        className={`w-full h-full object-cover ${selectedMember.objectPosition || 'object-center'}`}
                      />
                      <div class="absolute inset-0 bg-gradient-to-t from-[#191C16]/90 via-transparent to-transparent"></div>
                      <div class="absolute bottom-0 left-0 p-8 text-white">
                        <h1 class="text-4xl sm:text-5xl font-black mb-2 military-font uppercase tracking-wider drop-shadow-md">{selectedMember.name[lang]}</h1>

                      </div>
                    </div>

                    <div class="p-8 sm:p-12">
                      <h2 class="text-xl font-bold text-[#2B3830] mb-6 military-font uppercase tracking-widest pb-2 border-b border-[#DCE3DB]">{translations[lang].detailHistory}</h2>
                      
                      {/* Опис з абзацами */}
                      <div class="text-[#5C6E62] text-lg leading-relaxed mb-10 space-y-6 serif-accent italic">
                        {selectedMember.description[lang].split('\n\n').map((paragraph, index) => (
                          <p key={index}>{paragraph}</p>
                        ))}
                      </div>

                      {/* Кнопка "Детальніше про мою діяльність" */}
                      {selectedMember.externalLink && (
                        <div class="mb-10 military-font tracking-widest text-xs">
                          <a 
                            href={selectedMember.externalLink} 
                            target="_blank" 
                            rel="noopener noreferrer" 
                            className="inline-flex items-center justify-center bg-[#E9EBE4] hover:bg-[#768E80] text-[#2B3830] hover:text-white font-bold py-3.5 px-8 rounded-sm transition duration-300 border border-[#DCE3DB] shadow-sm uppercase"
                          >
                            {translations[lang].detailMoreBtn}
                            <svg class="ml-2 w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                            </svg>
                          </a>
                        </div>
                      )}
                    </div>
                  </div>
                </main>

              {/* Тактичний преміальний футер */}
              <footer class="bg-[#2B3830] text-[#A4B5A9] py-12 border-t border-[#DCE3DB] tracking-wider military-font text-xs">
                <div class="max-w-5xl mx-auto px-4 text-center">
                  <div class="flex justify-center space-x-1.5 mb-6 text-[#768E80]">
                    <span>★</span>

                    <span>★</span>

                  <p class="uppercase font-bold tracking-[0.25em] text-[#F4F6F4] mb-2">Military Ministry Ukraine // CRU</p>
                  <p class="text-[10px] text-[#A4B5A9]/70">{translations[lang].footerGlory}</p>
                </div>
              </footer>
            </div>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
